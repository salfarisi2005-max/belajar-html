<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login Page</title>
  </head>
  <body>
    <div class="flex items-center justify-center bg-blue-200 min-h-screen">
      <div
        class="flex flex-col w-1/2 bg-white rounded-4xl px-5 pb-5 shadow-lg border-6 border-black relative min-h-150"
      >
        <div
          class="flex items-center w-full justify-center absolute center-0 left-0"
        >
          <div class="w-3/5 h-7 bg-black rounded-b-xl"></div>
        </div>
        <div class="flex flex-1 w-full items-end py-5">
          <h3 class="font-semibold text-2xl">
            Hey,<br />
            Login Now!
          </h3>
        </div>
        <div class="flex gap-3">
          <a href="" class="text-slate-500">I Am Old User /</a>
          <a href="">Create New</a>
        </div>
        <form action="" class="py-5">
          <input
            type="text"
            placeholder="Username"
            class="w-full bg-slate-100 font-bold text-sm rounded-md px-4 py-2 mb-2 outline-none border border-yellow-400"
          />
          <input
            type="password"
            placeholder="********"
            class="w-full bg-slate-100 font-bold text-sm rounded-md px-4 py-2 mb-2 outline-none border border-yellow-400"
          />
          <div class="flex gap-3 text-sm mb-4">
            <p class="text-slate-500">Forget Password? /</p>
            <a href="#">Reset</a>
          </div>
          <button
            class="w-full bg-yellow-300 text-sm font-bold py-2 rounded-md text-slate-900 hover:bg-yellow-400 hover:cursor-pointer mb-8"
          >
            Login Now
          </button>
          <a href="" class="w-full flex items-center justify-center"
            >Skip Now</a
          >
        </form>
      </div>
    </div>
  </body>
</html>
