<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Profile Salman</title>
  </head>
  <body>
    <div class="flex items-center justify-center -full min-h-screen bg-sky-50">
      <div class="w-90 bg-white rounded- shadow-lg">
        <img
          src="https://picsum.photos/300/500"
          class="w-full rounded-t-2xl h-48 object-cover"
        />
        <div class="flex flex-col items-center text-center p-5 -mt-20">
          <img
            src="https://picsum.photos/300/300"
            class="w-32 h-32 object-cover rounded-full mb-1"
          />
          <h3 class="text-xl font-bold py-2">Salman Alfarisi</h3>
          <p class="text-sm mb-3">
            Mahasiswa Universitas La Tansa Mashiro dengan IPK 3,89 | Cita-cita
            ingin menjadi Programmer Profesional
          </p>
          <div class="w-full flex text-sm my-3">
            <p class="flex justify-center w-1/2 gap-2">
              <i class="bi bi-geo-alt-fill"></i>Rangkasbitung
            </p>
            <p class="flex justify-center w-1/2 gap-2">
              <i class="bi bi-envelope-fill"></i>Send Email
            </p>
          </div>
        </div>
        <div class="flex w-full items-center text-center">
          <div class="w-1/2 border border-slate-200 bg-slate-100 py-2">
            <p class="font-bold text-lg">8.100</p>
            <p class="text-sm text-slate-500">Followers</p>
          </div>
          <div class="w-1/2 border border-slate-200 bg-slate-100 py-2">
            <p class="font-bold text-lg">3.650</p>
            <p class="text-sm text-slate-500">Followings</p>
          </div>
        </div>
        <button
          class="w-full bg-green-500 h-12 rounded-b-2xl text-sm font-bold text-slate-100 hover:bg-green-600 hover:cursor-pointer"
        >
          Follow
        </button>
      </div>
    </div>
  </body>
</html>
