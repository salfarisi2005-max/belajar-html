<!doctype html>
<html lang="en">
  <head>
    <title>Layouting</title>
    <style>
      #container {
        width: 100%;
        height: 100vh;
        /* display: flex;
        flex-direction: column; */
      }
      #header {
        background-color: lightblue;
        height: 20%;
      }
      #content {
        display: flex;
        height: 60%;
        background-color: lightyellow;
      }
      #left {
        background-color: lightgreen;
        width: 30%;
        /* height: 50%; */
      }
      #right {
        background-color: lightcoral;
        width: 70%;
        /* height: 50%; */
      }
      #footer {
        background-color: lightgray;
        height: 20%;
      }
    </style>
  </head>
  <body>
    <!-- Container -->
    <div id="container">
      <!-- Header -->
      <div id="header">Header</div>
      <!-- Content/Body -->
      <div id="content">
        <div id="left">Kiri</div>
        <div id="right">Kanan</div>
      </div>
      <!-- Footer -->
      <div id="footer">Footer</div>
    </div>
  </body>
</html>
