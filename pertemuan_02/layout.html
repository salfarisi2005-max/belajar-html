<!doctype html>
<html lang="en">
  <head>
    <title>Layouting</title>
    <style>
      #container {
        width: 100%;
        height: 100vh;
        /* display: flex;
        flex-direction: column; */
      }
      #header {
        background-color: lightblue;
        height: 20%;
      }
      #content {
        display: flex;
        height: 60%;
        background-color: lightyellow;
      }
      #left {
        background-color: lightgreen;
        width: 30%;
        /* height: 50%; */
      }
      #right {
        background-color: lightcoral;
        width: 70%;
        /* height: 50%; */
      }
      #footer {
        background-color: lightgray;
        height: 20%;
      }
      .fontstyle-leftcontent-x {
        /* color: #ff00aa; */
        font-weight: bold;
        text-align: center;
      }
      .fontstyle-leftcontent {
        /* color: #ff00aa; */
        font-weight: 500;
      }
      .font-pink {
        color: #ff00aa;
      }
    </style>
  </head>
  <body>
    <!-- Container -->
    <div id="container">
      <!-- Header -->
      <div id="header">Header</div>
      <!-- Content/Body -->
      <div id="content">
        <div id="left">
          <h3 class="fontstyle-leftcontent-x font-pink">Left Content</h3>
          <p class="font-pink fontstyle-leftcontent">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Placeat,
            labore?
          </p>
        </div>
        <div id="right">Kanan</div>
      </div>
      <!-- Footer -->
      <div id="footer">Footer</div>
    </div>
  </body>
</html>
