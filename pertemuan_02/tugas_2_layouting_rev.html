<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas 2 Revisi</title>
    <style>
      #container {
        width: 100%;
        height: 100vh;
      }
      #header {
        width: 100%;
        height: auto;
        display: flex;
      }
      #logo {
        width: 20%;
        background-color: white;
        text-align: center;
        font-size: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid black;
      }
      #menus {
        width: 80%;
        height: auto;
        background-color: rgb(117, 59, 59);
        display: flex;
        flex-direction: column;
        align-items: end;
        justify-content: space-between;
        padding-left: 5px;
        padding-right: 5px;
      }
      #social_header {
        width: 200px;
        border: 1px solid black;
        padding: 4px;
      }
      #primary_nav {
        width: 100%;
      }
      #primary_nav p {
        border: 1px solid black;
        padding: 4px;
      }
      #content {
        width: 100%;
        height: auto;
      }
      #hero {
        width: 100%;
        height: 300px;
        background-color: brown;
      }
      #footer {
        width: 100%;
        height: auto;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="header">
        <div id="logo">Logo</div>
        <div id="menus">
          <div id="social_header">Social Media Link</div>
          <div id="primary_nav">
            <p>Primary Navigation</p>
          </div>
        </div>
      </div>
      <div id="content">
        <div id="hero">
          Hero Image<br />Image Slideshow / Video / BIG image and text
        </div>
        <div id="teaser">
          <div id="teaser1"></div>
          <div id="teaser2"></div>
          <div id="teaser3"></div>
        </div>
      </div>
      <div id="footer">
        <div id="copyright"></div>
        <div id="social_footer"></div>
      </div>
    </div>
  </body>
</html>
